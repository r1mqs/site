<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Premium - Vapes</title>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 15px 10px 90px 10px; }
        .catalogo { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px 12px; max-width: 600px; margin: 0 auto; }
        
        .card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-bottom: 1px solid #333; }
        
        .info-produto { padding: 10px; display: flex; flex-direction: column; flex-grow: 1; }
        .info-produto h3 { margin: 0 0 8px 0; font-size: 1.1rem; color: #4caf50; line-height: 1.2; }
        
        .valores { margin-bottom: 10px; }
        .preco-vista { color: #ffffff; font-weight: bold; font-size: 0.95rem; display: block; }
        
        .lista-sabores { background: #141414; border: 1px solid #2a2a2a; border-radius: 6px; padding: 5px 8px; height: 150px; overflow-y: auto; margin-top: auto; }
        .lista-sabores::-webkit-scrollbar { width: 4px; }
        .lista-sabores::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        
        .opcao-sabor { display: flex; align-items: flex-start; padding: 6px 0; border-bottom: 1px solid #222; font-size: 0.75rem; color: #bbb; line-height: 1.3; cursor: pointer; }
        .opcao-sabor:last-child { border-bottom: none; }
        .opcao-sabor input { width: 16px; height: 16px; margin-right: 8px; margin-top: 2px; flex-shrink: 0; accent-color: #4caf50; }
        
        .textos-sabor { display: flex; flex-direction: column; }
        .destaque-sabor { color: #4caf50; font-weight: 600; font-size: 0.75rem; }
        .descricao-sabor { font-size: 0.65rem; color: #888; margin-top: 2px; line-height: 1.1; }
        
        .btn-flutuante { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: #25D366; color: white; text-align: center; padding: 14px; border-radius: 30px; font-size: 1.05rem; font-weight: bold; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.25); border: none; cursor: pointer; z-index: 100; }

        .modal-fundo { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 200; justify-content: center; align-items: center; }
        .modal-conteudo { background: #1e1e1e; padding: 25px; border-radius: 12px; width: 90%; max-width: 350px; text-align: center; border: 1px solid #333; display: flex; flex-direction: column; max-height: 90vh;}
        .modal-conteudo h2 { margin-top: 0; color: #fff; font-size: 1.2rem; margin-bottom: 15px;}
        
        .caixa-resumo { background: #141414; border: 1px solid #2a2a2a; border-radius: 8px; padding: 12px; margin-bottom: 15px; text-align: left; font-size: 0.85rem; color: #ddd; max-height: 200px; overflow-y: auto; }
        .caixa-resumo ul { padding-left: 0; margin: 0; }
        .caixa-resumo li { margin-bottom: 4px; list-style: none; }
        .caixa-resumo .resumo-titulo { color: #4caf50; font-weight: bold; margin-top: 8px; margin-bottom: 4px; font-size: 0.95rem; }
        .caixa-resumo .resumo-titulo:first-child { margin-top: 0; }
        
        .resumo-totais { border-top: 1px solid #333; margin-top: 10px; padding-top: 10px; font-weight: bold; }
        .resumo-totais .t-pix { color: #ffffff; display: block; font-size: 1rem; margin-bottom: 3px; }

        .btn-pagamento { display: block; width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .btn-pix { background: #32bcad; color: white; } 
        .btn-cartao { background: #444; color: white; border: 1px solid #666; }
        .btn-fechar-modal { background: none; border: none; color: #888; text-decoration: underline; margin-top: 5px; cursor: pointer; padding: 10px; width: 100%; }
        
        .input-endereco { width: 100%; box-sizing: border-box; padding: 10px; background: #141414; border: 1px solid #333; color: #fff; border-radius: 6px; margin-top: 4px; font-family: inherit; font-size: 0.9rem; }
        .input-endereco:focus { outline: none; border-color: #4caf50; }
        .label-endereco { color: #bbb; font-size: 0.8rem; margin-top: 10px; display: block; text-align: left; }
        .obrigatorio { color: #ff4444; font-size: 0.8rem; margin-left: 3px; }

        .tela-carregamento { grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; }
        .spinner { width: 45px; height: 45px; border: 4px solid #2a2a2a; border-top: 4px solid #4caf50; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .porcentagem { font-size: 1.8rem; font-weight: bold; color: #fff; margin-bottom: 5px; }
        .texto-loading { font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="catalogo" id="vitrineProdutos"></div>

    <button class="btn-flutuante" onclick="abrirModalPagamento()">Finalizar Pedido</button>

    <div class="modal-fundo" id="modalPagamento">
        <div class="modal-conteudo">
            <h2>Confira seu Pedido</h2>
            
            <div id="passo-resumo">
                <div class="caixa-resumo" id="resumoVisualHtml"></div>
                <h3 style="font-size: 1rem; color: #fff; margin-top: 0; margin-bottom: 15px;">Forma de Recebimento</h3>
                <button class="btn-pagamento btn-pix" onclick="finalizarPedido('Retirada')">Retirar no Local</button>
                <button class="btn-pagamento btn-cartao" onclick="mostrarEndereco()">Entrega (Delivery)</button>
                <button class="btn-fechar-modal" onclick="fecharModal()">Voltar e Editar</button>
            </div>

            <div id="passo-endereco" style="display: none;">
                <h3 style="font-size: 1rem; color: #fff; margin-top: 0; margin-bottom: 5px;">Endereço de Entrega</h3>
                
                <label class="label-endereco">Rua / Avenida<span class="obrigatorio">*</span></label>
                <input type="text" id="end-rua" class="input-endereco" placeholder="Ex: Av. Paraná">
                
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label class="label-endereco">Número<span class="obrigatorio">*</span></label>
                        <input type="text" id="end-numero" class="input-endereco" placeholder="Ex: 123">
                    </div>
                    <div style="flex: 2;">
                        <label class="label-endereco">Bairro<span class="obrigatorio">*</span></label>
                        <input type="text" id="end-bairro" class="input-endereco" placeholder="Ex: Centro">
                    </div>
                </div>

                <label class="label-endereco">Ponto de Referência<span class="obrigatorio">*</span></label>
                <input type="text" id="end-ref" class="input-endereco" placeholder="Ex: Ao lado do mercado...">

                <button class="btn-pagamento btn-pix" style="margin-top: 20px;" onclick="finalizarPedido('Entrega')">Confirmar Pedido</button>
                <button class="btn-fechar-modal" onclick="voltarResumo()">Voltar</button>
            </div>

        </div>
    </div>

    <script>
        const API_ESTOQUE = "https://script.google.com/macros/s/AKfycbxpnrZKWVhy-inOHMA9qetReDBfUTeLt5JEEp6yUs3ca4rcXCgsmzyGbXYadHczL7HAZQ/exec"; 
        let intervaloProgresso;

        window.onload = function() {
            document.getElementById('vitrineProdutos').innerHTML = `
                <div class="tela-carregamento">
                    <div class="spinner"></div>
                    <div class="porcentagem" id="loading-percent">0%</div>
                    <div class="texto-loading">Sincronizando Estoque</div>
                </div>
            `;
            
            let progresso = 0;
            intervaloProgresso = setInterval(() => {
                if (progresso < 92) {
                    progresso += Math.floor(Math.random() * 12) + 3;
                    if (progresso > 92) progresso = 92;
                    const el = document.getElementById('loading-percent');
                    if(el) el.innerText = progresso + '%';
                }
            }, 100);

            carregarEstoque();
        };

        async function carregarEstoque() {
            try {
                const resposta = await fetch(API_ESTOQUE);
                const dados = await resposta.json();
                
                clearInterval(intervaloProgresso);
                const el = document.getElementById('loading-percent');
                if(el) el.innerText = '100%';

                setTimeout(() => {
                    const produtosAgrupados = {};
                    
                    dados.forEach(item => {
                        if (!produtosAgrupados[item.produto]) {
                            produtosAgrupados[item.produto] = {
                                sabores: [],
                                pix: item.precoPix || 0,
                                cartao: item.precoCartao || 0,
                                img: item.imagem || "https://via.placeholder.com/300x300?text=Sem+Imagem" 
                            };
                        }
                        produtosAgrupados[item.produto].sabores.push(item);
                    });

                    renderizarCatalogo(produtosAgrupados);
                }, 300);

            } catch (erro) {
                console.error("Erro:", erro);
                clearInterval(intervaloProgresso);
                document.getElementById('vitrineProdutos').innerHTML = '<h3 style="color:#ff4444; text-align:center; grid-column: 1 / -1;">Erro ao carregar o estoque. Tente novamente.</h3>';
            }
        }

        function renderizarCatalogo(produtosAgrupados) {
            const vitrine = document.getElementById('vitrineProdutos');
            vitrine.innerHTML = ''; 

            for (const [nomeProduto, dadosProduto] of Object.entries(produtosAgrupados)) {
                let htmlSabores = '';
                dadosProduto.sabores.forEach(s => {
                    htmlSabores += `
                    <label class="opcao-sabor">
                        <input type="checkbox" class="sabor-checkbox" value="${s.sabor}"> 
                        <div class="textos-sabor">
                            <span class="destaque-sabor">${s.sabor}</span>
                            <span class="descricao-sabor">${s.descricao}</span>
                        </div>
                    </label>`;
                });

                const pixFormatado = parseFloat(dadosProduto.pix).toFixed(2).replace('.', ',');

                const cardHTML = `
                <div class="card" data-preco-pix="${dadosProduto.pix}">
                    <img src="${dadosProduto.img}" alt="${nomeProduto}">
                    <div class="info-produto">
                        <h3 class="nome-produto">${nomeProduto}</h3>
                        <div class="valores">
                            <span class="preco-vista">R$ ${pixFormatado}</span>
                        </div>
                        <div class="lista-sabores">
                            ${htmlSabores}
                        </div>
                    </div>
                </div>`;
                
                vitrine.innerHTML += cardHTML;
            }
        }

        function abrirModalPagamento() {
            let temItemMarcado = false;
            let resumoHTML = "<ul>";
            let valorTotal = 0;

            const cards = document.querySelectorAll('.card');

            cards.forEach(card => {
                const nomeProduto = card.querySelector('.nome-produto').innerText;
                const checkboxes = card.querySelectorAll('.sabor-checkbox:checked');
                
                if(checkboxes.length > 0) {
                    temItemMarcado = true;
                    resumoHTML += `<li class="resumo-titulo">${nomeProduto}</li>`;
                    
                    const precoBaseProduto = parseFloat(card.getAttribute('data-preco-pix'));
                    
                    checkboxes.forEach(box => {
                        resumoHTML += `<li>- 1x ${box.value}</li>`;
                        valorTotal += precoBaseProduto;
                    });
                }
            });

            if(!temItemMarcado) {
                alert("Por favor, selecione pelo menos um sabor antes de finalizar o pedido!");
                return;
            }

            resumoHTML += "</ul>";
            let totalFormatado = valorTotal.toFixed(2).replace('.', ',');
            
            resumoHTML += `
            <div class="resumo-totais">
                <span class="t-pix">Total: R$ ${totalFormatado}</span>
            </div>`;

            document.getElementById('resumoVisualHtml').innerHTML = resumoHTML;
            
            document.getElementById('passo-resumo').style.display = 'block';
            document.getElementById('passo-endereco').style.display = 'none';
            
            document.getElementById('end-rua').value = '';
            document.getElementById('end-numero').value = '';
            document.getElementById('end-bairro').value = '';
            document.getElementById('end-ref').value = ''; 

            document.getElementById('modalPagamento').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modalPagamento').style.display = 'none';
        }

        function mostrarEndereco() {
            document.getElementById('passo-resumo').style.display = 'none';
            document.getElementById('passo-endereco').style.display = 'block';
        }

        function voltarResumo() {
            document.getElementById('passo-endereco').style.display = 'none';
            document.getElementById('passo-resumo').style.display = 'block';
        }

        async function finalizarPedido(tipoRecebimento) {
            let enderecoFinalTexto = "";
            let btnClicado = event.target;
            let textoOriginalBtn = btnClicado.innerText;

            if (tipoRecebimento === 'Entrega') {
                const rua = document.getElementById('end-rua').value.trim();
                const numero = document.getElementById('end-numero').value.trim();
                const bairro = document.getElementById('end-bairro').value.trim();
                const referencia = document.getElementById('end-ref').value.trim();

                if (!rua || !numero || !bairro || !referencia) {
                    alert("Por favor, preencha todos os campos do endereço, incluindo o ponto de referência.");
                    return;
                }
                enderecoFinalTexto = `*Endereço de Entrega:*%0A${rua}, ${numero} - ${bairro}%0A*Referência:* ${referencia}%0A`;
            } else {
                enderecoFinalTexto = `*Recebimento:* Retirada no Local%0A`;
            }

            btnClicado.innerText = "Gerando pagamento...";
            btnClicado.disabled = true;

            const numeroWhatsApp = "5544999992222"; 
            let pedidoTexto = "Olá! Gostaria de fazer o seguinte pedido:%0A%0A";
            let quantidadeTotalItens = 0; 
            let valorTotal = 0;

            const cards = document.querySelectorAll('.card');

            cards.forEach(card => {
                const nomeProduto = card.querySelector('.nome-produto').innerText;
                const checkboxes = card.querySelectorAll('.sabor-checkbox:checked');
                
                if(checkboxes.length > 0) {
                    pedidoTexto += `*${nomeProduto}*%0A`;
                    const precoBaseProduto = parseFloat(card.getAttribute('data-preco-pix'));
                    
                    checkboxes.forEach(box => {
                        pedidoTexto += `- 1x ${box.value}%0A`;
                        quantidadeTotalItens++; 
                        valorTotal += precoBaseProduto;
                    });
                    pedidoTexto += "%0A"; 
                }
            });

            const totalFormatado = valorTotal.toFixed(2).replace('.', ',');

            pedidoTexto += `*Resumo do Pedido:*%0A`;
            pedidoTexto += `Quantidade: ${quantidadeTotalItens} unidade(s)%0A`;
            pedidoTexto += enderecoFinalTexto;
            pedidoTexto += `*Total: R$ ${totalFormatado}*%0A`;

            try {
                // Converte os valores e textos para passarem na URL sem erro
                const valorCentavos = Math.round(valorTotal * 100);
                const desc = encodeURIComponent(`Pedido Vapes - ${quantidadeTotalItens} itens`);
                
                // Manda a requisição via GET para o Google Apps Script
                const URL_DO_GOOGLE_SCRIPT = `https://script.google.com/macros/s/AKfycbzQ7f5NUZvRZv_T8aCxSllRxM-JAErkcFg6hUJ7-Tt0y9F2lHVnofO5qlVLov9KcNWXew/exec?valor=${valorCentavos}&descricao=${desc}`;

                const resposta = await fetch(URL_DO_GOOGLE_SCRIPT);
                const dados = await resposta.json();
                const linkGerado = dados.url || dados.link;

                if (linkGerado) {
                    pedidoTexto += `%0A💳 *Pague com Pix ou Cartão de Crédito aqui:* %0A${linkGerado}`;
                } else {
                    pedidoTexto += `%0A⚠️ *Aguardando envio do link de pagamento.*`;
                    console.log("Erro retornado:", dados);
                }
            } catch (erro) {
                console.error("Erro na comunicação com o script:", erro);
                pedidoTexto += `%0A⚠️ *Aguardando envio do link de pagamento.*`;
            }

            fecharModal();
            btnClicado.innerText = textoOriginalBtn;
            btnClicado.disabled = false;
            
            window.location.href = `https://wa.me/${numeroWhatsApp}?text=${pedidoTexto}`;
        }
    </script>
</body>
</html>

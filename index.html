<!DOCTYPE html>

    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 15px 10px 90px 10px; }
        
        /* O espaçamento foi ajustado aqui: gap: 30px (vertical) 12px (horizontal) */
        .catalogo { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px 12px; max-width: 600px; margin: 0 auto; }
        
        .card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-bottom: 1px solid #333; }
        
        .info-produto { padding: 10px; display: flex; flex-direction: column; flex-grow: 1; }
        .info-produto h3 { margin: 0 0 8px 0; font-size: 1.1rem; color: #4caf50; line-height: 1.2; }
        
        .valores { margin-bottom: 10px; }
        .preco-vista { color: #ffffff; font-weight: bold; font-size: 0.95rem; display: block; }
        .preco-cartao { font-size: 0.75rem; color: #888; display: block; margin-top: 2px; }
        
        .lista-sabores { background: #141414; border: 1px solid #2a2a2a; border-radius: 6px; padding: 5px 8px; max-height: 150px; overflow-y: auto; margin-top: auto; }
        .lista-sabores::-webkit-scrollbar { width: 4px; }
        .lista-sabores::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        
        .opcao-sabor { display: flex; align-items: flex-start; padding: 6px 0; border-bottom: 1px solid #222; font-size: 0.75rem; color: #bbb; line-height: 1.3; }
        .opcao-sabor:last-child { border-bottom: none; }
        .opcao-sabor input { width: 16px; height: 16px; margin-right: 8px; margin-top: 2px; flex-shrink: 0; accent-color: #4caf50; }
        
        .btn-flutuante { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: #25D366; color: white; text-align: center; padding: 14px; border-radius: 30px; font-size: 1.05rem; font-weight: bold; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.25); border: none; cursor: pointer; z-index: 100; }

        .modal-fundo { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 200; justify-content: center; align-items: center; }
        .modal-conteudo { background: #1e1e1e; padding: 25px; border-radius: 12px; width: 90%; max-width: 350px; text-align: center; border: 1px solid #333; }
        .modal-conteudo h2 { margin-top: 0; color: #fff; font-size: 1.2rem; margin-bottom: 20px;}
        .btn-pagamento { display: block; width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .btn-pix { background: #32bcad; color: white; } 
        .btn-cartao { background: #444; color: white; border: 1px solid #666; }
        .btn-fechar-modal { background: none; border: none; color: #888; text-decoration: underline; margin-top: 10px; cursor: pointer; }
    </style>
</head>

    <div class="modal-fundo" id="modalPagamento">
        <div class="modal-conteudo">
            <h2>Como deseja pagar?</h2>
            <button class="btn-pagamento btn-pix" onclick="processarPedido('Pix/Dinheiro')">Pix ou Dinheiro</button>
            <button class="btn-pagamento btn-cartao" onclick="processarPedido('Cartão')">Cartão de Crédito/Débito</button>
            <button class="btn-fechar-modal" onclick="fecharModal()">Cancelar</button>
        </div>
    </div>

    <script>
        window.onload = function() {
            const cards = document.querySelectorAll('.card');
            
            cards.forEach(card => {
                let valorPix = parseFloat(card.getAttribute('data-preco-pix'));
                let valorCartao = parseFloat(card.getAttribute('data-preco-cartao'));
                
                let pixFormatado = valorPix.toFixed(2).replace('.', ',');
                let cartaoFormatado = valorCartao.toFixed(2).replace('.', ',');
                
                card.querySelector('.preco-vista').innerText = `R$ ${pixFormatado} (no pix)`;
                card.querySelector('.preco-cartao').innerText = `ou R$ ${cartaoFormatado} no cartão em até 2x.`;
            });
        };

        function abrirModalPagamento() {
            let temItemMarcado = false;
            document.querySelectorAll('.sabor-checkbox:checked').forEach(() => { temItemMarcado = true; });
            
            if(!temItemMarcado) {
                alert("Por favor, selecione pelo menos um sabor antes de finalizar o pedido!");
                return;
            }
            document.getElementById('modalPagamento').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modalPagamento').style.display = 'none';
        }

        function processarPedido(formaDePagamentoSelecionada) {
            const numeroWhatsApp = "5544999992222"; 
            let pedidoTexto = "Olá! Gostaria de fazer o seguinte pedido:%0A%0A";
            let quantidadeTotalItens = 0; 
            
            let valorTotalPix = 0;
            let valorTotalCartao = 0;

            const cards = document.querySelectorAll('.card');

            cards.forEach(card => {
                const nomeProduto = card.querySelector('.nome-produto').innerText;
                const checkboxes = card.querySelectorAll('.sabor-checkbox:checked');
                
                if(checkboxes.length > 0) {
                    pedidoTexto += `*${nomeProduto}*%0A`;
                    
                    const precoPixProduto = parseFloat(card.getAttribute('data-preco-pix'));
                    const precoCartaoProduto = parseFloat(card.getAttribute('data-preco-cartao'));
                    
                    checkboxes.forEach(box => {
                        pedidoTexto += `- 1x ${box.value}%0A`;
                        quantidadeTotalItens++; 
                        
                        valorTotalPix += precoPixProduto;
                        valorTotalCartao += precoCartaoProduto;
                    });
                    pedidoTexto += "%0A"; 
                }
            });

            let valorFinalCalculado = 0;
            if(formaDePagamentoSelecionada === 'Pix/Dinheiro') {
                valorFinalCalculado = valorTotalPix;
            } else if (formaDePagamentoSelecionada === 'Cartão') {
                valorFinalCalculado = valorTotalCartao;
            }

            const totalFormatado = valorFinalCalculado.toFixed(2).replace('.', ',');

            pedidoTexto += `*Resumo do Pedido:*%0A`;
            pedidoTexto += `Quantidade: ${quantidadeTotalItens} unidade(s)%0A`;
            pedidoTexto += `Forma de Pagamento: ${formaDePagamentoSelecionada}%0A`;
            pedidoTexto += `*Total a Pagar: R$ ${totalFormatado}*%0A`;

            fecharModal();

            const link = `https://wa.me/${numeroWhatsApp}?text=${pedidoTexto}`;
            window.open(link, '_blank');
        }
    </script>

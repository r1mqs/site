<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Vapes</title>

<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#07091a;
    --glass:rgba(255,255,255,.06);
    --border:rgba(255,255,255,.1);
    --text:#fff;
    --green:#30d158;
    --red:#ff453a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:'Urbanist',sans-serif;
    padding:20px 20px 100px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.catalogo{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
    max-width:1300px;
    margin:auto;
}

.card{
    background:var(--glass);
    border:1px solid var(--border);
    border-radius:24px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:260px;
    object-fit:cover;
}

.info{
    padding:16px;
}

.nome{
    font-size:1rem;
    font-weight:700;
    margin-bottom:8px;
}

.preco{
    color:var(--green);
    font-weight:700;
    margin-bottom:16px;
}

.sabores{
    max-height:180px;
    overflow:auto;
}

.sabor{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:10px;
}

.sabor.sem-estoque{
    opacity:.4;
    pointer-events:none;
}

.tag-sem-estoque{
    font-size:.7rem;
    background:var(--red);
    color:#fff;
    border-radius:6px;
    padding:1px 6px;
    margin-left:4px;
}

.loading{
    text-align:center;
    margin-top:80px;
}

.btn-finalizar{
    position:fixed;
    left:50%;
    bottom:20px;
    transform:translateX(-50%);
    background:var(--green);
    color:#000;
    border:none;
    padding:16px 30px;
    border-radius:999px;
    font-weight:700;
    font-size:1rem;
    cursor:pointer;
    box-shadow:0 4px 20px rgba(48,209,88,.4);
}

/* MODAL */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.75);
    display:none;
    justify-content:center;
    align-items:flex-end;
    z-index:99;
}

.modal.show{
    display:flex;
}

.modal-content{
    width:100%;
    max-width:500px;
    margin:0 auto;
    background:#11152c;
    border-radius:24px 24px 0 0;
    padding:24px 24px 40px;
    max-height:90vh;
    overflow-y:auto;
}

.modal-title{
    font-size:1.1rem;
    font-weight:700;
    margin-bottom:16px;
}

.resumo-item{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    border-bottom:1px solid var(--border);
    font-size:.9rem;
}

.resumo-total{
    display:flex;
    justify-content:space-between;
    padding:10px 0 0;
    font-weight:700;
    font-size:1rem;
    color:var(--green);
}

.campo{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,.08);
    color:#fff;
    font-family:'Urbanist',sans-serif;
    font-size:.95rem;
}

.campo option{
    background:#11152c;
}

.btn{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    font-weight:700;
    font-size:1rem;
    font-family:'Urbanist',sans-serif;
    cursor:pointer;
}

.btn-green{
    background:var(--green);
    color:#000;
}

.btn-ghost{
    background:rgba(255,255,255,.08);
    color:#fff;
}

.btn-green.loading-btn{
    opacity:.7;
    cursor:not-allowed;
}

#area-cartao{
    display:none;
    margin-top:12px;
    background:rgba(255,255,255,.05);
    border-radius:12px;
    padding:14px;
    font-size:.85rem;
    color:rgba(255,255,255,.7);
    text-align:center;
}

#link-pagamento{
    display:block;
    margin-top:10px;
    color:var(--green);
    font-weight:700;
    word-break:break-all;
}

</style>
</head>

<body>

<h1>Vapes Premium</h1>

<div class="loading" id="loading">
    Carregando produtos...
</div>

<div class="catalogo" id="catalogo"></div>

<button class="btn-finalizar" onclick="abrirModal()">
    🛒 Finalizar Pedido
</button>

<div class="modal" id="modal">

    <div class="modal-content">

        <div class="modal-title">
            Resumo do Pedido
        </div>

        <div id="resumo"></div>

        <select class="campo" id="sel-bairro">
            <option value="">Escolha o bairro</option>
        </select>

        <input class="campo" id="rua" placeholder="Rua">

        <input class="campo" id="numero" placeholder="Número">

        <input class="campo" id="referencia" placeholder="Referência">

        <select class="campo" id="pagamento" onchange="onChangePagamento()">

            <option value="">Forma de pagamento</option>

            <option value="pix">Pix</option>

            <option value="cartao">Cartão</option>

        </select>

        <div id="area-cartao">

            Clique em confirmar pedido para gerar o link.

            <a
                id="link-pagamento"
                href="#"
                target="_blank"
                style="display:none"
            >
                Abrir link de pagamento
            </a>

        </div>

        <button
            class="btn btn-green"
            id="btn-confirmar"
            onclick="finalizarPedido()"
        >
            Confirmar Pedido
        </button>

        <button
            class="btn btn-ghost"
            onclick="fecharModal()"
        >
            Fechar
        </button>

    </div>

</div>

<script>

/* =====================================================
CONFIG
===================================================== */

const API_ESTOQUE =
"https://script.google.com/macros/s/AKfycbxSRrZtLRP1YCzf7XbWHvwR5N72f4AITYqF0dlXoFPkZyLTkuq17qtV_uErmy9eg9Nk0w/exec";

const WHATSAPP = "5544999992222";


/* =====================================================
ESTADO
===================================================== */

let bairros = [];
let subtotal = 0;
let itensSelecionados = [];


/* =====================================================
INIT
===================================================== */

window.onload = () => {
    carregarProdutos();
};


/* =====================================================
CARREGAR PRODUTOS
===================================================== */

async function carregarProdutos(){

    try {

        const url = API_ESTOQUE + "?t=" + Date.now();

        console.log("Buscando API:", url);

        const resp = await fetch(url);

        const texto = await resp.text();

        console.log("Resposta RAW:", texto);

        let dados;

        try {

            dados = JSON.parse(texto);

        } catch(parseErro){

            document.getElementById("loading").innerHTML =
            `
            <span style="color:var(--red)">
                ❌ A API não retornou JSON válido.<br><br>

                <small style="word-break:break-word">
                    ${texto}
                </small>
            </span>
            `;

            return;
        }

        if (dados.erro) {

            document.getElementById("loading").innerHTML =
            `
            <span style="color:var(--red)">
                ❌ Erro no Apps Script:<br><br>
                ${dados.erro}
            </span>
            `;

            return;
        }

        const produtos = dados.produtos || [];

        bairros = dados.bairros || [];

        preencherBairros();

        renderizarProdutos(produtos);

        document.getElementById("loading").style.display = "none";

    } catch(e) {

        console.error(e);

        document.getElementById("loading").innerHTML =
        `
        <span style="color:var(--red)">
            ❌ Erro geral:<br><br>
            ${e.message}
        </span>
        `;
    }
}


/* =====================================================
BAIRROS
===================================================== */

function preencherBairros(){

    const sel = document.getElementById("sel-bairro");

    sel.innerHTML =
    `<option value="">Escolha o bairro</option>`;

    bairros.forEach((b, i) => {

        sel.innerHTML +=
        `
        <option value="${i}">
            ${b.bairro} — Taxa: R$ ${fmt(b.taxaEntrega)}
        </option>
        `;
    });
}


/* =====================================================
PRODUTOS
===================================================== */

function renderizarProdutos(produtos){

    const catalogo = document.getElementById("catalogo");

    catalogo.innerHTML = "";

    const agrupados = {};

    produtos.forEach(p => {

        if (!agrupados[p.produto]) {

            agrupados[p.produto] = {
                imagem: p.imagem,
                preco: p.preco,
                sabores: []
            };
        }

        agrupados[p.produto].sabores.push(p);
    });

    for (const [nome, d] of Object.entries(agrupados)){

        let saboresHTML = "";

        d.sabores.forEach(s => {

            const semEstoque = s.estoque <= 0;

            saboresHTML +=
            `
            <label class="sabor ${semEstoque ? 'sem-estoque' : ''}">

                <input
                    type="checkbox"
                    class="produto-check"
                    data-produto="${nome}"
                    data-sabor="${s.sabor}"
                    data-preco="${d.preco}"
                    ${semEstoque ? 'disabled' : ''}
                >

                ${s.sabor}

                ${
                    semEstoque
                    ? '<span class="tag-sem-estoque">Sem estoque</span>'
                    : ''
                }

            </label>
            `;
        });

        catalogo.innerHTML +=
        `
        <div class="card">

            <img
                src="${d.imagem}"
                onerror="this.src='https://via.placeholder.com/400x260/07091a/ffffff?text=Sem+Imagem'"
            >

            <div class="info">

                <div class="nome">
                    ${nome}
                </div>

                <div class="preco">
                    R$ ${fmt(d.preco)}
                </div>

                <div class="sabores">
                    ${saboresHTML}
                </div>

            </div>

        </div>
        `;
    }
}


/* =====================================================
MODAL
===================================================== */

function abrirModal(){

    const checks =
    document.querySelectorAll(".produto-check:checked");

    if (!checks.length) {

        alert("Selecione pelo menos um sabor.");

        return;
    }

    subtotal = 0;

    itensSelecionados = [];

    let resumoHTML = "";

    checks.forEach(item => {

        const preco = Number(item.dataset.preco);

        subtotal += preco;

        itensSelecionados.push({
            produto: item.dataset.produto,
            sabor: item.dataset.sabor,
            preco: preco
        });

        resumoHTML +=
        `
        <div class="resumo-item">
            <span>
                ${item.dataset.produto} — ${item.dataset.sabor}
            </span>

            <span>
                R$ ${fmt(preco)}
            </span>
        </div>
        `;
    });

    resumoHTML +=
    `
    <div class="resumo-total">
        <span>Subtotal</span>
        <span>R$ ${fmt(subtotal)}</span>
    </div>
    `;

    document.getElementById("resumo").innerHTML = resumoHTML;

    document.getElementById("modal")
    .classList.add("show");
}

function fecharModal(){

    document.getElementById("modal")
    .classList.remove("show");
}

function onChangePagamento(){

    const pag =
    document.getElementById("pagamento").value;

    document.getElementById("area-cartao").style.display =
    pag === "cartao" ? "block" : "none";
}


/* =====================================================
FINALIZAR PEDIDO
===================================================== */

async function finalizarPedido(){

    const bairroIndex =
    document.getElementById("sel-bairro").value;

    const rua =
    document.getElementById("rua").value.trim();

    const numero =
    document.getElementById("numero").value.trim();

    const referencia =
    document.getElementById("referencia").value.trim();

    const pagamento =
    document.getElementById("pagamento").value;

    if (bairroIndex === "") {

        alert("Escolha o bairro.");

        return;
    }

    if (!rua || !numero) {

        alert("Preencha rua e número.");

        return;
    }

    if (!pagamento) {

        alert("Escolha a forma de pagamento.");

        return;
    }

    const bairro = bairros[parseInt(bairroIndex)];

    const taxa = Number(bairro.taxaEntrega);

    const total = subtotal + taxa;

    if (pagamento === "pix") {

        enviarWhatsApp(
            bairro,
            rua,
            numero,
            referencia,
            pagamento,
            total,
            taxa
        );

        return;
    }

    try {

        const valorCentavos =
        Math.round(total * 100);

        const desc =
        itensSelecionados
        .map(i => `${i.produto} ${i.sabor}`)
        .join(", ");

        const url =
        `${API_ESTOQUE}?valor=${valorCentavos}&descricao=${encodeURIComponent(desc)}`;

        const resp = await fetch(url);

        const data = await resp.json();

        if (data.payment_url || data.url || data.link) {

            const linkPag =
            data.payment_url || data.url || data.link;

            const linkEl =
            document.getElementById("link-pagamento");

            linkEl.href = linkPag;

            linkEl.style.display = "block";

            window.open(linkPag, "_blank");

        } else {

            alert(
                "Erro ao gerar link:\n\n" +
                JSON.stringify(data)
            );
        }

    } catch(e) {

        alert(
            "Erro de conexão:\n\n" +
            e.message
        );
    }
}


/* =====================================================
WHATSAPP
===================================================== */

function enviarWhatsApp(
    bairro,
    rua,
    numero,
    referencia,
    pagamento,
    total,
    taxa
){

    let msg =
    "Olá! Gostaria de fazer um pedido:%0A%0A";

    itensSelecionados.forEach(i => {

        msg +=
        `• ${i.produto} — ${i.sabor} (R$ ${fmt(i.preco)})%0A`;
    });

    msg += `%0ABairro: ${bairro.bairro}%0A`;

    msg += `Taxa: R$ ${fmt(taxa)}%0A`;

    msg += `Rua: ${rua}%0A`;

    msg += `Número: ${numero}%0A`;

    if (referencia) {

        msg += `Referência: ${referencia}%0A`;
    }

    msg += `Pagamento: ${pagamento}%0A`;

    msg += `%0A*Total: R$ ${fmt(total)}*`;

    window.open(
        `https://wa.me/${WHATSAPP}?text=${msg}`,
        "_blank"
    );
}


/* =====================================================
HELPER
===================================================== */

function fmt(n){

    return Number(n)
    .toFixed(2)
    .replace(".", ",");
}

document.getElementById("modal")
.addEventListener("click", function(e){

    if (e.target === this) {

        fecharModal();
    }
});

</script>

</body>
</html>

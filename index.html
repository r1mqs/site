<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo – Vapes</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --tint:        #30d158;
            --tint-glow:   rgba(48,209,88,0.28);
            --tint-fill:   rgba(48,209,88,0.14);
            --tint-border: rgba(48,209,88,0.32);
            --glass:       rgba(255,255,255,0.07);
            --glass-hover: rgba(255,255,255,0.11);
            --glass-deep:  rgba(12,16,30,0.68);
            --border:      rgba(255,255,255,0.14);
            --border-top:  rgba(255,255,255,0.28);
            --shadow-card: 0 12px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.16);
            --text:        rgba(255,255,255,0.92);
            --text-2:      rgba(255,255,255,0.52);
            --text-3:      rgba(255,255,255,0.28);
            --r-card:      22px;
            --r-pill:      100px;
            --r-sm:        14px;
            --font: 'Urbanist', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font);
            background: #07091a;
            color: var(--text);
            min-height: 100vh;
            padding: 28px 14px 116px;
            overflow-x: hidden;
        }

        /* ── WALLPAPER ORBS ── */
        .bg {
            position: fixed; inset: 0;
            pointer-events: none; z-index: 0; overflow: hidden;
        }

        .orb { position: absolute; border-radius: 50%; animation: drift 20s ease-in-out infinite; }

        .o1 {
            width: 70vw; height: 70vw;
            background: radial-gradient(circle at 40% 40%, rgba(99,102,241,0.5) 0%, transparent 65%);
            top: -20%; left: -18%; filter: blur(60px); animation-delay: 0s;
        }
        .o2 {
            width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(20,184,166,0.42) 0%, transparent 65%);
            bottom: 0; right: -12%; filter: blur(55px); animation-delay: -7s;
        }
        .o3 {
            width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(244,63,94,0.3) 0%, transparent 65%);
            top: 38%; left: 22%; filter: blur(70px); animation-delay: -13s;
        }
        .o4 {
            width: 42vw; height: 42vw;
            background: radial-gradient(circle, rgba(48,209,88,0.22) 0%, transparent 65%);
            top: 8%; right: 0; filter: blur(60px); animation-delay: -4s;
        }

        @keyframes drift {
            0%,100% { transform: translate(0,0) scale(1); }
            33%      { transform: translate(5%,7%) scale(1.07); }
            66%      { transform: translate(-4%,-5%) scale(0.95); }
        }

        /* ── HEADER ── */
        .page-header {
            position: relative; z-index: 1;
            text-align: center; margin-bottom: 22px;
            animation: fadeDown .55s cubic-bezier(.22,1,.36,1) both;
        }

        @keyframes fadeDown {
            from { opacity:0; transform: translateY(-12px); }
            to   { opacity:1; transform: translateY(0); }
        }

        .eyebrow-pill {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid var(--border); border-top-color: var(--border-top);
            border-radius: var(--r-pill); padding: 5px 14px;
            font-size: .62rem; font-weight: 700;
            letter-spacing: .17em; text-transform: uppercase;
            color: var(--tint); margin-bottom: 10px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .eyebrow-pill::before {
            content: ''; width: 6px; height: 6px;
            background: var(--tint); border-radius: 50%;
            box-shadow: 0 0 8px var(--tint);
            animation: blink 2.4s ease-in-out infinite;
        }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

        .page-header h1 {
            font-size: 2.1rem; font-weight: 800;
            letter-spacing: -.045em; color: #fff; line-height: 1;
            text-shadow: 0 2px 30px rgba(99,102,241,0.25);
        }

        /* ── GRID ── */
        .catalogo {
            display: grid; grid-template-columns: repeat(2,1fr);
            gap: 12px; max-width: 600px;
            margin: 0 auto; position: relative; z-index: 1;
        }

        /* ── CARD ── */
        .card {
            background: var(--glass);
            backdrop-filter: blur(44px) saturate(170%);
            -webkit-backdrop-filter: blur(44px) saturate(170%);
            border: 0.5px solid var(--border); border-top-color: var(--border-top);
            border-radius: var(--r-card); overflow: hidden;
            display: flex; flex-direction: column;
            box-shadow: var(--shadow-card);
            transition: background .28s, transform .3s cubic-bezier(.22,1,.36,1), box-shadow .3s;
            animation: riseUp .5s cubic-bezier(.34,1.56,.64,1) both;
        }

        .card:hover {
            background: var(--glass-hover);
            transform: translateY(-5px) scale(1.015);
            box-shadow: 0 24px 56px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.22);
        }

        @keyframes riseUp {
            from { opacity:0; transform:translateY(22px) scale(.96); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }

        .card:nth-child(1){animation-delay:.06s} .card:nth-child(2){animation-delay:.11s}
        .card:nth-child(3){animation-delay:.16s} .card:nth-child(4){animation-delay:.21s}
        .card:nth-child(5){animation-delay:.26s} .card:nth-child(6){animation-delay:.31s}
        .card:nth-child(7){animation-delay:.36s} .card:nth-child(8){animation-delay:.41s}

        .card-img-wrap { position: relative; overflow: hidden; }

        .card img {
            width:100%; aspect-ratio:1/1; object-fit:cover; display:block;
            transition: transform .5s ease;
        }

        .card:hover img { transform: scale(1.07); }

        .card-img-wrap::after {
            content:''; position:absolute; bottom:0; left:0; right:0; height:55%;
            background: linear-gradient(to top, rgba(7,9,26,.72) 0%, transparent 100%);
            pointer-events: none;
        }

        /* ── INFO ── */
        .info-produto {
            padding: 10px 12px 14px;
            display: flex; flex-direction: column;
            flex-grow: 1; gap: 8px;
        }

        .nome-produto {
            font-size: .88rem; font-weight: 700;
            color: #fff; letter-spacing: -.01em; line-height: 1.25;
        }

        .preco-badge {
            display: inline-flex; align-items: center; align-self: flex-start;
            background: var(--tint-fill);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 0.5px solid var(--tint-border);
            border-top-color: rgba(48,209,88,.55);
            color: var(--tint); font-size: .76rem; font-weight: 700;
            padding: 3px 10px; border-radius: var(--r-pill);
            box-shadow: 0 0 12px rgba(48,209,88,.12);
        }

        /* ── SABORES ── */
        .lista-sabores {
            background: rgba(0,0,0,.22);
            border: 0.5px solid rgba(255,255,255,.07);
            border-radius: var(--r-sm);
            padding: 4px 8px; height: 148px; overflow-y: auto;
            scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.12) transparent;
        }

        .lista-sabores::-webkit-scrollbar { width:3px }
        .lista-sabores::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12); border-radius:4px }

        .opcao-sabor {
            display: flex; align-items: flex-start;
            padding: 6.5px 0;
            border-bottom: .5px solid rgba(255,255,255,.05);
            cursor: pointer; transition: opacity .15s;
        }

        .opcao-sabor:last-child { border-bottom: none; }
        .opcao-sabor:hover { opacity: .8; }

        .opcao-sabor input[type="checkbox"] {
            appearance:none; -webkit-appearance:none;
            width:16px; height:16px; min-width:16px;
            border: 1.5px solid rgba(255,255,255,.22);
            border-radius: 5px; margin-right:8px; margin-top:2px;
            cursor:pointer; background:rgba(255,255,255,.04);
            transition: all .22s cubic-bezier(.34,1.56,.64,1);
            position: relative;
        }

        .opcao-sabor input[type="checkbox"]:checked {
            background: var(--tint); border-color: var(--tint);
            box-shadow: 0 0 0 3px rgba(48,209,88,.18);
            transform: scale(1.08);
        }

        .opcao-sabor input[type="checkbox"]:checked::after {
            content:''; position:absolute;
            top:1.5px; left:4.5px;
            width:4px; height:8px;
            border:2px solid #000; border-top:none; border-left:none;
            transform: rotate(45deg);
        }

        .textos-sabor { display:flex; flex-direction:column; }

        .destaque-sabor { font-size:.7rem; font-weight:600; color:rgba(255,255,255,.88); line-height:1.3; }
        .descricao-sabor { font-size:.6rem; color:var(--text-3); margin-top:1px; line-height:1.2; }

        /* ── FLOATING BUTTON ── */
        .btn-flutuante {
            position:fixed; bottom:26px; left:50%;
            transform:translateX(-50%);
            width:calc(100% - 28px); max-width:420px;
            background:rgba(48,209,88,.9);
            backdrop-filter:blur(20px) saturate(160%);
            -webkit-backdrop-filter:blur(20px) saturate(160%);
            color:rgba(0,0,0,.88); font-family:var(--font);
            font-size:.92rem; font-weight:800; letter-spacing:.01em;
            border:none; cursor:pointer; padding:16px 24px;
            border-radius:var(--r-pill); z-index:100;
            box-shadow:
                0 8px 32px var(--tint-glow),
                0 2px 6px rgba(0,0,0,.25),
                inset 0 1px 0 rgba(255,255,255,.38);
            transition:transform .22s, box-shadow .22s, opacity .18s;
        }

        .btn-flutuante:hover {
            transform:translateX(-50%) scale(1.025);
            box-shadow:0 14px 44px rgba(48,209,88,.42), inset 0 1px 0 rgba(255,255,255,.42);
        }

        .btn-flutuante:active { transform:translateX(-50%) scale(.96); opacity:.82; }

        /* ── MODAL ── */
        .modal-fundo {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,.55);
            backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
            z-index:200; justify-content:center; align-items:flex-end;
        }

        .modal-conteudo {
            background:var(--glass-deep);
            backdrop-filter:blur(60px) saturate(190%);
            -webkit-backdrop-filter:blur(60px) saturate(190%);
            border:.5px solid var(--border); border-top-color:var(--border-top);
            border-bottom:none; border-radius:30px 30px 0 0;
            width:100%; max-width:520px;
            padding:16px 20px 44px; max-height:88vh; overflow-y:auto;
            animation:sheetUp .38s cubic-bezier(.22,1,.36,1) both;
            box-shadow:0 -8px 48px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.14);
        }

        @keyframes sheetUp {
            from { transform:translateY(100%); opacity:.6; }
            to   { transform:translateY(0);    opacity:1;  }
        }

        .modal-handle {
            width:36px; height:4px;
            background:rgba(255,255,255,.18);
            border-radius:4px; margin:0 auto 20px;
        }

        .modal-conteudo h2 {
            font-size:1.12rem; font-weight:800; letter-spacing:-.025em;
            color:#fff; text-align:center; margin-bottom:14px;
        }

        .caixa-resumo {
            background:rgba(255,255,255,.05);
            backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
            border:.5px solid var(--border); border-top-color:var(--border-top);
            border-radius:18px; padding:12px 14px;
            margin-bottom:16px; font-size:.82rem;
            max-height:200px; overflow-y:auto;
            box-shadow:inset 0 1px 0 rgba(255,255,255,.1);
        }

        .caixa-resumo ul { list-style:none; }
        .caixa-resumo li { margin-bottom:3px; color:rgba(255,255,255,.72); font-size:.8rem; }
        .caixa-resumo .resumo-titulo { font-weight:700; font-size:.82rem; color:var(--tint); margin-top:8px; margin-bottom:4px; }
        .caixa-resumo .resumo-titulo:first-child { margin-top:0; }

        .resumo-totais { border-top:.5px solid rgba(255,255,255,.08); margin-top:10px; padding-top:10px; }
        .t-pix { font-size:1.05rem; font-weight:800; color:#fff; display:block; }

        .secao-label {
            font-size:.63rem; font-weight:700; letter-spacing:.16em;
            text-transform:uppercase; color:var(--text-2);
            text-align:center; margin-bottom:10px;
        }

        .btn-pagamento {
            display:flex; align-items:center; justify-content:center; gap:8px;
            width:100%; margin-bottom:10px; padding:15px;
            border-radius:var(--r-pill); border:none; font-family:var(--font);
            font-weight:700; font-size:.9rem; cursor:pointer;
            transition:opacity .18s, transform .15s;
        }

        .btn-pagamento:active { transform:scale(.96); opacity:.78; }

        .btn-pix {
            background:rgba(48,209,88,.9); color:rgba(0,0,0,.86);
            box-shadow:0 4px 22px var(--tint-glow), inset 0 1px 0 rgba(255,255,255,.32);
        }

        .btn-cartao {
            background:var(--glass); color:var(--text);
            backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            border:.5px solid var(--border) !important; border-top-color:var(--border-top) !important;
            box-shadow:inset 0 1px 0 rgba(255,255,255,.1);
        }

        .btn-fechar-modal {
            display:block; background:none; border:none;
            color:var(--text-2); font-family:var(--font);
            font-size:.82rem; font-weight:500; cursor:pointer;
            padding:10px; width:100%; text-align:center; transition:color .2s;
        }

        .btn-fechar-modal:hover { color:var(--text); }

        .label-endereco {
            display:block; font-size:.66rem; font-weight:700;
            letter-spacing:.09em; text-transform:uppercase;
            color:var(--text-2); margin-top:12px; margin-bottom:5px;
        }

        .obrigatorio { color:#ff453a; margin-left:2px; }

        .input-endereco {
            width:100%; padding:12px 14px;
            background:rgba(255,255,255,.06);
            backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
            border:.5px solid var(--border); border-top-color:var(--border-top);
            color:#fff; border-radius:var(--r-sm); font-family:var(--font);
            font-size:.88rem; outline:none;
            transition:background .2s, border-color .2s, box-shadow .2s;
        }

        .input-endereco:focus {
            background:rgba(255,255,255,.09);
            border-color:rgba(48,209,88,.5);
            box-shadow:0 0 0 3.5px rgba(48,209,88,.1);
        }

        .input-endereco::placeholder { color:rgba(255,255,255,.2); }

        .input-row { display:flex; gap:10px; }
        .input-row > div { flex:1; }
        .input-row > div:last-child { flex:2; }

        /* ── LOADING ── */
        .tela-carregamento {
            grid-column:1/-1; display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            padding:80px 20px; gap:16px;
        }

        .glass-loader {
            width:68px; height:68px;
            background:var(--glass);
            backdrop-filter:blur(36px); -webkit-backdrop-filter:blur(36px);
            border:.5px solid var(--border-top); border-radius:20px;
            display:flex; align-items:center; justify-content:center;
            box-shadow:var(--shadow-card);
            animation:loaderPulse 1.6s ease-in-out infinite;
        }

        @keyframes loaderPulse {
            0%,100% { box-shadow:0 0 0 0 rgba(48,209,88,.18), var(--shadow-card); }
            50%      { box-shadow:0 0 0 14px rgba(48,209,88,0), var(--shadow-card); }
        }

        .spinner {
            width:30px; height:30px;
            border:2.5px solid rgba(255,255,255,.1);
            border-top-color:var(--tint); border-radius:50%;
            animation:spin .85s linear infinite;
        }

        @keyframes spin { to { transform:rotate(360deg); } }

        .porcentagem { font-size:2.4rem; font-weight:800; letter-spacing:-.045em; color:#fff; }
        .texto-loading { font-size:.6rem; color:var(--text-3); letter-spacing:.22em; text-transform:uppercase; }
    </style>
</head>
<body>

    <div class="bg" aria-hidden="true">
        <div class="orb o1"></div>
        <div class="orb o2"></div>
        <div class="orb o3"></div>
        <div class="orb o4"></div>
    </div>

    <header class="page-header">
        <div class="eyebrow-pill">Catálogo Oficial</div>
        <h1>Vapes Premium</h1>
    </header>

    <div class="catalogo" id="vitrineProdutos"></div>

    <button class="btn-flutuante" onclick="abrirModalPagamento()">Finalizar Pedido</button>

    <div class="modal-fundo" id="modalPagamento">
        <div class="modal-conteudo">
            <div class="modal-handle"></div>
            <h2>Confira seu Pedido</h2>

            <div id="passo-resumo">
                <div class="caixa-resumo" id="resumoVisualHtml"></div>
                <p class="secao-label">Forma de Recebimento</p>
                <button class="btn-pagamento btn-pix" onclick="finalizarPedido('Retirada')">🏪  Retirar no Local</button>
                <button class="btn-pagamento btn-cartao" onclick="mostrarEndereco()">🛵  Entrega (Delivery)</button>
                <button class="btn-fechar-modal" onclick="fecharModal()">Voltar e Editar</button>
            </div>

            <div id="passo-endereco" style="display:none">
                <p class="secao-label">Endereço de Entrega</p>

                <label class="label-endereco">Rua / Avenida<span class="obrigatorio">*</span></label>
                <input type="text" id="end-rua" class="input-endereco" placeholder="Ex: Av. Paraná">

                <div class="input-row">
                    <div>
                        <label class="label-endereco">Número<span class="obrigatorio">*</span></label>
                        <input type="text" id="end-numero" class="input-endereco" placeholder="123">
                    </div>
                    <div>
                        <label class="label-endereco">Bairro<span class="obrigatorio">*</span></label>
                        <input type="text" id="end-bairro" class="input-endereco" placeholder="Centro">
                    </div>
                </div>

                <label class="label-endereco">Ponto de Referência<span class="obrigatorio">*</span></label>
                <input type="text" id="end-ref" class="input-endereco" placeholder="Ex: Ao lado do mercado...">

                <button class="btn-pagamento btn-pix" style="margin-top:20px" onclick="finalizarPedido('Entrega')">✓  Confirmar Pedido</button>
                <button class="btn-fechar-modal" onclick="voltarResumo()">← Voltar</button>
            </div>
        </div>
    </div>

    <script>
        const API_ESTOQUE = "https://script.google.com/macros/s/AKfycbxpnrZKWVhy-inOHMA9qetReDBfUTeLt5JEEp6yUs3ca4rcXCgsmzyGbXYadHczL7HAZQ/exec";
        let intervaloProgresso;

        window.onload = function() {
            document.getElementById('vitrineProdutos').innerHTML = `
                <div class="tela-carregamento">
                    <div class="glass-loader"><div class="spinner"></div></div>
                    <div class="porcentagem" id="loading-percent">0%</div>
                    <div class="texto-loading">Sincronizando Estoque</div>
                </div>`;

            let progresso = 0;
            intervaloProgresso = setInterval(() => {
                if (progresso < 92) {
                    progresso += Math.floor(Math.random() * 12) + 3;
                    if (progresso > 92) progresso = 92;
                    const el = document.getElementById('loading-percent');
                    if (el) el.innerText = progresso + '%';
                }
            }, 100);

            carregarEstoque();
        };

        async function carregarEstoque() {
            try {
                const resposta = await fetch(API_ESTOQUE);
                const dados = await resposta.json();

                clearInterval(intervaloProgresso);
                const el = document.getElementById('loading-percent');
                if (el) el.innerText = '100%';

                setTimeout(() => {
                    const produtosAgrupados = {};
                    dados.forEach(item => {
                        if (!produtosAgrupados[item.produto]) {
                            produtosAgrupados[item.produto] = {
                                sabores: [], pix: item.precoPix || 0,
                                cartao: item.precoCartao || 0,
                                img: item.imagem || "https://via.placeholder.com/300x300?text=Sem+Imagem"
                            };
                        }
                        produtosAgrupados[item.produto].sabores.push(item);
                    });
                    renderizarCatalogo(produtosAgrupados);
                }, 300);

            } catch (erro) {
                clearInterval(intervaloProgresso);
                document.getElementById('vitrineProdutos').innerHTML =
                    '<h3 style="color:#ff453a;text-align:center;grid-column:1/-1;padding:40px 0">Erro ao carregar o estoque. Tente novamente.</h3>';
            }
        }

        function renderizarCatalogo(produtosAgrupados) {
            const vitrine = document.getElementById('vitrineProdutos');
            vitrine.innerHTML = '';

            for (const [nomeProduto, dadosProduto] of Object.entries(produtosAgrupados)) {
                let htmlSabores = '';
                dadosProduto.sabores.forEach(s => {
                    htmlSabores += `
                    <label class="opcao-sabor">
                        <input type="checkbox" class="sabor-checkbox" value="${s.sabor}">
                        <div class="textos-sabor">
                            <span class="destaque-sabor">${s.sabor}</span>
                            <span class="descricao-sabor">${s.descricao}</span>
                        </div>
                    </label>`;
                });

                const pixFormatado = parseFloat(dadosProduto.pix).toFixed(2).replace('.', ',');

                vitrine.innerHTML += `
                <div class="card" data-preco-pix="${dadosProduto.pix}">
                    <div class="card-img-wrap">
                        <img src="${dadosProduto.img}" alt="${nomeProduto}" loading="lazy">
                    </div>
                    <div class="info-produto">
                        <h3 class="nome-produto">${nomeProduto}</h3>
                        <span class="preco-badge">R$ ${pixFormatado}</span>
                        <div class="lista-sabores">${htmlSabores}</div>
                    </div>
                </div>`;
            }
        }

        function abrirModalPagamento() {
            let temItemMarcado = false;
            let resumoHTML = "<ul>";
            let valorTotal = 0;

            document.querySelectorAll('.card').forEach(card => {
                const nomeProduto = card.querySelector('.nome-produto').innerText;
                const checkboxes = card.querySelectorAll('.sabor-checkbox:checked');
                if (checkboxes.length > 0) {
                    temItemMarcado = true;
                    resumoHTML += `<li class="resumo-titulo">${nomeProduto}</li>`;
                    const precoBase = parseFloat(card.getAttribute('data-preco-pix'));
                    checkboxes.forEach(box => {
                        resumoHTML += `<li>– 1x ${box.value}</li>`;
                        valorTotal += precoBase;
                    });
                }
            });

            if (!temItemMarcado) {
                alert("Por favor, selecione pelo menos um sabor antes de finalizar o pedido!");
                return;
            }

            resumoHTML += `</ul><div class="resumo-totais"><span class="t-pix">Total: R$ ${valorTotal.toFixed(2).replace('.', ',')}</span></div>`;
            document.getElementById('resumoVisualHtml').innerHTML = resumoHTML;
            document.getElementById('passo-resumo').style.display = 'block';
            document.getElementById('passo-endereco').style.display = 'none';
            ['end-rua','end-numero','end-bairro','end-ref'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('modalPagamento').style.display = 'flex';
        }

        function fecharModal()    { document.getElementById('modalPagamento').style.display = 'none'; }
        function mostrarEndereco() {
            document.getElementById('passo-resumo').style.display = 'none';
            document.getElementById('passo-endereco').style.display = 'block';
        }
        function voltarResumo() {
            document.getElementById('passo-endereco').style.display = 'none';
            document.getElementById('passo-resumo').style.display = 'block';
        }

        async function finalizarPedido(tipoRecebimento) {
            let enderecoFinalTexto = "";
            let btnClicado = event.target;
            let textoOriginalBtn = btnClicado.innerText;

            if (tipoRecebimento === 'Entrega') {
                const rua    = document.getElementById('end-rua').value.trim();
                const num    = document.getElementById('end-numero').value.trim();
                const bairro = document.getElementById('end-bairro').value.trim();
                const ref    = document.getElementById('end-ref').value.trim();
                if (!rua || !num || !bairro || !ref) {
                    alert("Por favor, preencha todos os campos do endereço, incluindo o ponto de referência.");
                    return;
                }
                enderecoFinalTexto = `*Endereço de Entrega:*%0A${rua}, ${num} - ${bairro}%0A*Referência:* ${ref}%0A`;
            } else {
                enderecoFinalTexto = `*Recebimento:* Retirada no Local%0A`;
            }

            btnClicado.innerText = "Gerando pagamento...";
            btnClicado.disabled = true;

            const numeroWhatsApp = "5544999992222";
            let pedidoTexto = "Olá! Gostaria de fazer o seguinte pedido:%0A%0A";
            let qtd = 0, valorTotal = 0;

            document.querySelectorAll('.card').forEach(card => {
                const nomeProduto = card.querySelector('.nome-produto').innerText;
                const checkboxes = card.querySelectorAll('.sabor-checkbox:checked');
                if (checkboxes.length > 0) {
                    pedidoTexto += `*${nomeProduto}*%0A`;
                    const precoBase = parseFloat(card.getAttribute('data-preco-pix'));
                    checkboxes.forEach(box => {
                        pedidoTexto += `- 1x ${box.value}%0A`;
                        qtd++; valorTotal += precoBase;
                    });
                    pedidoTexto += "%0A";
                }
            });

            const totalFormatado = valorTotal.toFixed(2).replace('.', ',');
            pedidoTexto += `*Resumo do Pedido:*%0AQuantidade: ${qtd} unidade(s)%0A${enderecoFinalTexto}*Total: R$ ${totalFormatado}*%0A`;

            try {
                const valorCentavos = Math.round(valorTotal * 100);
                const desc = encodeURIComponent(`Pedido Vapes - ${qtd} itens`);
                const URL_SCRIPT = `https://script.google.com/macros/s/AKfycbzQ7f5NUZvRZv_T8aCxSllRxM-JAErkcFg6hUJ7-Tt0y9F2lHVnofO5qlVLov9KcNWXew/exec?valor=${valorCentavos}&descricao=${desc}`;
                const resp  = await fetch(URL_SCRIPT);
                const dados = await resp.json();
                const link  = dados.url || dados.link;
                pedidoTexto += link
                    ? `%0A💳 *Pague com Pix ou Cartão aqui:* %0A${link}`
                    : `%0A⚠️ *Aguardando envio do link de pagamento.*`;
            } catch {
                pedidoTexto += `%0A⚠️ *Aguardando envio do link de pagamento.*`;
            }

            fecharModal();
            btnClicado.innerText = textoOriginalBtn;
            btnClicado.disabled = false;
            window.location.href = `https://wa.me/${numeroWhatsApp}?text=${pedidoTexto}`;
        }
    </script>
</body>
</html>
